name: Build MSI Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Least-privilege: no permissions by default
permissions: {}

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore & audit NuGet packages
        run: dotnet restore src/Nexplorer.App/Nexplorer.App.csproj

      - name: Run tests
        run: dotnet test tests/Nexplorer.Tests/Nexplorer.Tests.csproj --verbosity normal

      - name: Build with security analyzers
        run: >
          dotnet build src/Nexplorer.App/Nexplorer.App.csproj
          -c Release -warnaserror
          -p:TreatWarningsAsErrors=true

      - name: Publish app
        run: >
          dotnet publish src/Nexplorer.App/Nexplorer.App.csproj
          -c Release -r win-x64 --self-contained
          -o publish/Nexplorer

      - name: Install WiX Toolset
        run: |
          dotnet tool install --global wix --version 6.0.2
          wix extension add -g WixToolset.UI.wixext/6.0.2

      - name: Build MSI
        working-directory: installer
        run: wix build Package.wxs -ext WixToolset.UI.wixext -o ../publish/Nexplorer-Setup.msi

      - name: Generate MSI checksum
        run: |
          $hash = (Get-FileHash publish/Nexplorer-Setup.msi -Algorithm SHA256).Hash
          "$hash  Nexplorer-Setup.msi" | Out-File publish/Nexplorer-Setup.msi.sha256 -Encoding utf8
          Write-Output "SHA256: $hash"

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexplorer-Setup
          path: |
            publish/Nexplorer-Setup.msi
            publish/Nexplorer-Setup.msi.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download MSI artifact
        uses: actions/download-artifact@v4
        with:
          name: Nexplorer-Setup

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Nexplorer-Setup.msi
            Nexplorer-Setup.msi.sha256
          generate_release_notes: true
