name: Build MSI Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/FileExplorer.App/FileExplorer.App.csproj

      - name: Run tests
        run: dotnet test tests/FileExplorer.Tests/FileExplorer.Tests.csproj --verbosity normal

      - name: Publish app
        run: >
          dotnet publish src/FileExplorer.App/FileExplorer.App.csproj
          -c Release -r win-x64 --self-contained
          -o publish/Nexplorer

      - name: Install WiX Toolset
        run: |
          dotnet tool install --global wix
          wix extension add -g WixToolset.UI.wixext

      - name: Build MSI
        working-directory: installer
        run: wix build Package.wxs -ext WixToolset.UI.wixext -o ../publish/Nexplorer-Setup.msi

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexplorer-Setup
          path: publish/Nexplorer-Setup.msi

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download MSI artifact
        uses: actions/download-artifact@v4
        with:
          name: Nexplorer-Setup

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Nexplorer-Setup.msi
          generate_release_notes: true
